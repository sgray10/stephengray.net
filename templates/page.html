<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #0f1115;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #4da3ff;
      --border: #2a2f36;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 760px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.65;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5em;
    }

    .date {
      color: var(--muted);
      margin-bottom: 2em;
    }

    a {
      color: var(--accent);
    }

    pre {
      background: #15181e;
      padding: 1em;
      overflow-x: auto;
    }
  </style>
</head>

<body>

<h1>{{ page.title }}</h1>
<div class="date">{{ page.date }}</div>

{{ page.content | safe }}

</body>
</html>
