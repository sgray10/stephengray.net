<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ section.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #0f1115;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #4da3ff;
      --border: #2a2f36;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 760px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.65;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1em;
    }

    .post {
      margin-bottom: 2em;
      padding-bottom: 1em;
      border-bottom: 1px solid var(--border);
    }

    .post a {
      font-size: 1.2rem;
      color: var(--accent);
      text-decoration: none;
    }

    .post a:hover {
      text-decoration: underline;
    }

    .date {
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<h1>{{ section.title }}</h1>

{% for page in section.pages %}
  <div class="post">
    <a href="{{ page.permalink }}">{{ page.title }}</a>
    <div class="date">{{ page.date }}</div>
  </div>
{% endfor %}

</body>
</html>
