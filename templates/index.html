<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ config.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #0f1115;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #4da3ff;
      --border: #2a2f36;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.65;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.8em;
    }

    .nav a {
      color: var(--text);
      text-decoration: none;
      margin-left: 1em;
      font-size: 0.95rem;
    }

    .nav a:hover {
      color: var(--accent);
    }

    .nav .left {
      font-weight: 600;
    }

    /* HERO */
    .hero {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 2.5em;
    }

    .hero img {
      width: 90px;
      height: 90px;
      border-radius: 6px;
      object-fit: cover;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-size: 1.6rem;
      margin: 0;
      line-height: 1.3;
    }

    .subtle {
      color: var(--muted);
      margin-top: 0.3em;
      font-size: 0.95rem;
    }

    h2 {
      margin-top: 2.5em;
      font-size: 1.3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.3em;
    }

    p {
      margin: 1em 0;
    }

    ul {
      margin: 1em 0;
      padding-left: 1.2em;
    }

    li {
      margin: 0.4em 0;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .email {
      font-size: 1.1rem;
      color: var(--accent);
    }

    @media (max-width: 600px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero img {
        width: 70px;
        height: 70px;
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <div class="left">Stephen Gray</div>
    <div class="right">
      <a href="/">Home</a>
      <a href="/writeups/">Writeups</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <img src="/me.jpg" alt="Stephen Gray">
    <div class="hero-text">
      <h1>If someone targeted your system, how far would they get?</h1>
      <div class="subtle">Offensive security. Former Accenture, Booz Allen, Cisco.</div>
    </div>
  </div>

  <!-- CONTENT -->
  {{ section.content | safe }}

</body>
</html>
